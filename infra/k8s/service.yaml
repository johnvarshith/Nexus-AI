apiVersion: v1
kind: Service
metadata:
  name: nexusai-backend-service
spec:
  selector:
    app: nexusai-backend
  ports:
  - protocol: TCP
    port: 8000
    targetPort: 8000
  type: ClusterIP
---
apiVersion: v1
kind: Service
metadata:
  name: nexusai-frontend-service
spec:
  selector:
    app: nexusai-frontend
  ports:
  - protocol: TCP
    port: 80
    targetPort: 3000
  type: LoadBalancer